<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Dashboard</h2>

  <img id="photo" src="https://via.placeholder.com/100">

  <h3 id="name"></h3>
  <p id="email"></p>

  <button onclick="logout()">Logout</button>
</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "login.html";
}

// ✅ FIX NAME (your real key is username)
document.getElementById("name").innerText =
  user.username || "No Name";

// ✅ FIX EMAIL (you have email + email address)
document.getElementById("email").innerText =
  user.email || user["email address"] || "No Email";

// ✅ FIX IMAGE (Google Drive conversion)
let photo =
  user["upload profile photo"] || "";

if (photo.includes("open?id=")) {
  const fileId = photo.split("open?id=")[1];
  photo = "https://drive.google.com/uc?export=view&id=" + fileId;
}

document.getElementById("photo").src =
  photo || "https://via.placeholder.com/100";

// Logout
function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

</script>

</body>
</html>
