<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Dashboard</h2>

  <img id="photo" src="https://via.placeholder.com/100">

  <h3 id="name">Loading...</h3>
  <p id="email">Loading...</p>

  <button onclick="logout()">Logout</button>
</div>

<script>

// Get user from login storage
const user = JSON.parse(localStorage.getItem("user"));

// If no user → redirect
if (!user) {
  window.location.href = "login.html";
}

// 🔧 SAFE FIELD HANDLING (fix missing name/email)
document.getElementById("name").innerText =
  user.name || user.Name || user["name "] || "No Name";

document.getElementById("email").innerText =
  user.email || user.Email || user["email "] || "No Email";

// 🔧 FIX IMAGE (Google Drive support)
let photo = user.photo || user.Photo || "";

if (photo.includes("drive.google.com")) {
  const match = photo.match(/[-\w]{25,}/);
  if (match) {
    photo = "https://drive.google.com/uc?export=view&id=" + match[0];
  }
}

document.getElementById("photo").src =
  photo || "https://via.placeholder.com/100";

// Logout
function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

</script>

</body>
</html>
